name: Auto Assign PR Author

on:
  pull_request:
    types: [opened, reopened]

permissions:
  pull-requests: write

jobs:
  assign-author-of-pr:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.type != 'Bot' && github.event.pull_request.assignees[0] == null
    steps:
      - name: Assign PR author
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
        run: gh pr edit "$PR" --repo "$GITHUB_REPOSITORY" --add-assignee "$AUTHOR"
